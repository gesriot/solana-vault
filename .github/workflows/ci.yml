name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  SOLANA_VERSION: "3.1.14"
  ANCHOR_VERSION: "1.0.2"
  NODE_VERSION:   "20"
  RUST_TOOLCHAIN: stable

jobs:
  # ── 1. Rust checks ────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust lint + audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked

      - name: cargo deny
        run: cargo deny --log-level warn --manifest-path ./Cargo.toml --all-features check

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: cargo audit
        run: cargo audit

  # ── 2. Build + test ───────────────────────────────────────────────────────────
  anchor-test:
    name: Anchor build + test
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI
        shell: bash
        run: |
          set -euo pipefail

          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64) target="aarch64-apple-darwin" ;;
            Darwin-x86_64) target="x86_64-apple-darwin" ;;
            Linux-aarch64 | Linux-arm64) target="aarch64-unknown-linux-gnu" ;;
            Linux-x86_64) target="x86_64-unknown-linux-gnu" ;;
            *) echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac

          installer="/tmp/agave-install-init"
          curl -fsSL \
            "https://github.com/anza-xyz/agave/releases/download/v${SOLANA_VERSION}/agave-install-init-${target}" \
            -o "$installer"
          chmod +x "$installer"
          "$installer" "v${SOLANA_VERSION}"

          # Agave installer may use either path; check both
          SOLANA_BIN="$HOME/.local/share/agave/install/active_release/bin"
          if ! test -d "$SOLANA_BIN"; then
            SOLANA_BIN="$HOME/.local/share/solana/install/active_release/bin"
          fi
          test -x "$SOLANA_BIN/solana"
          "$SOLANA_BIN/solana" --version
          echo "$SOLANA_BIN" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Check toolchain versions
        run: |
          solana --version
          solana-keygen --version
          anchor --version

      - name: Generate test wallet
        run: |
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Install JS deps
        run: npm install

      - name: anchor build
        run: anchor build --ignore-keys

      - name: anchor test
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .anchor
          solana-test-validator \
            --reset \
            --quiet \
            --ledger .anchor/test-ledger \
            --bpf-program 31mDBe7jLM8UVoqfBCUpC5yKsijh3uoKekKgRR1Z7VCJ target/deploy/vault.so \
            > .anchor/validator.log 2>&1 &
          validator_pid=$!

          cleanup() {
            kill "$validator_pid" >/dev/null 2>&1 || true
            wait "$validator_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          validator_ready=false
          for _ in {1..60}; do
            if solana --url http://127.0.0.1:8899 cluster-version >/dev/null 2>&1; then
              validator_ready=true
              break
            fi
            sleep 1
          done

          if [[ "$validator_ready" != true ]]; then
            cat .anchor/validator.log
            exit 1
          fi

          export ANCHOR_PROVIDER_URL=http://127.0.0.1:8899
          export ANCHOR_WALLET="$HOME/.config/solana/id.json"

          if ! node node_modules/ts-mocha/bin/ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts; then
            cat .anchor/validator.log
            exit 1
          fi

      - name: Upload IDL artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-idl
          path: target/idl/vault.json

  # ── 3. ESLint ─────────────────────────────────────────────────────────────────
  eslint:
    name: ESLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run lint
