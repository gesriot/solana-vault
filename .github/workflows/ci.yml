name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  SOLANA_VERSION: "1.18.22"
  ANCHOR_VERSION: "0.30.1"
  NODE_VERSION:   "20"
  RUST_TOOLCHAIN: stable

jobs:
  # ── 1. Rust checks ────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust lint + audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked

      - name: cargo deny
        run: cargo deny --log-level warn --manifest-path ./Cargo.toml --all-features check

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: cargo audit
        run: cargo audit

  # ── 2. Build + test ───────────────────────────────────────────────────────────
  anchor-test:
    name: Anchor build + test
    runs-on: macos-15
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI
        shell: bash
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "Unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          installer="/tmp/solana-install-init"
          curl -fsSL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-install-init-${target}" \
            -o "$installer"
          chmod +x "$installer"
          "$installer" "v${SOLANA_VERSION}"

          SOLANA_BIN="$HOME/.local/share/solana/install/active_release/bin"
          test -x "$SOLANA_BIN/solana"
          "$SOLANA_BIN/solana" --version
          echo "$SOLANA_BIN" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Check toolchain versions
        run: |
          solana --version
          solana-keygen --version
          anchor --version

      - name: Generate test wallet
        run: |
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Install JS deps
        run: npm ci

      - name: anchor build
        run: anchor build

      - name: anchor test
        run: anchor test --skip-build

      - name: Upload IDL artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-idl
          path: target/idl/vault.json

  # ── 3. ESLint ─────────────────────────────────────────────────────────────────
  eslint:
    name: ESLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
