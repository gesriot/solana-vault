[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MPL-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Zlib",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[advisories]
ignore = [
  # bincode unmaintained (pinned by solana-program / anchor-lang)
  "RUSTSEC-2025-0141",
]

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry  = "deny"
unknown-git       = "deny"
allow-registry    = ["https://github.com/rust-lang/crates.io-index"]
